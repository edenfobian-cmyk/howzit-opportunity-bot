name: Daily Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Upload HTML
        uses: actions/upload-artifact@v4
        with:
          name: page
          path: page.html
